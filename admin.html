<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>後台管理 — 貓嶼微光</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css"/>
<style>
:root{
  --parchment:#f2e8d5;--cream:#faf4ea;--wood-dk:#3d2b1a;--wood-md:#6b4a30;
  --wood-lt:#a07850;--stone:#c8a87a;--indigo-dk:#253d5e;--indigo:#2e4a6b;
  --indigo-lt:#4a6e96;--sakura:#e8b4b8;--gold:#c8a030;--ink:#1e130a;
  --moss:#5a6e4a;--danger:#b04040;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--wood-dk);min-height:100vh;}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--indigo-dk);padding:1.5rem;}
.login-box{background:var(--parchment);padding:2.5rem 2rem;max-width:380px;width:100%;}
.login-title{font-family:'Noto Serif TC',serif;font-size:1.4rem;font-weight:900;color:var(--wood-dk);letter-spacing:.15em;margin-bottom:.3rem;}
.login-sub{font-size:.8rem;color:var(--stone);letter-spacing:.1em;margin-bottom:1.8rem;}
.login-box label{font-size:.7rem;letter-spacing:.25em;color:var(--wood-lt);display:block;margin-bottom:.3rem;}
.login-box input{width:100%;padding:.65rem .85rem;background:#fff;border:1px solid rgba(139,107,69,.25);font-size:.9rem;font-family:'Noto Sans TC',sans-serif;outline:none;margin-bottom:.9rem;transition:border-color .2s;}
.login-box input:focus{border-color:var(--indigo);}
.login-error{font-size:.78rem;color:var(--danger);margin-bottom:.8rem;display:none;}
.btn-primary{width:100%;padding:.7rem;background:var(--indigo);border:none;color:#fff;font-family:'Noto Serif TC',serif;font-size:.88rem;letter-spacing:.25em;cursor:pointer;transition:background .2s;}
.btn-primary:hover{background:var(--indigo-dk);}

/* ── HEADER ── */
#admin-screen{display:none;}
header{background:var(--ink);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;border-bottom:1px solid rgba(200,160,48,.2);position:sticky;top:0;z-index:100;}
.header-logo{font-family:'Noto Serif TC',serif;font-size:1rem;color:var(--gold);letter-spacing:.2em;}
.header-actions{display:flex;gap:.8rem;align-items:center;}
.btn-sm{padding:.35rem 1.1rem;font-size:.72rem;letter-spacing:.15em;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:opacity .2s;}
.btn-sm:hover{opacity:.82;}
.btn-secondary{background:rgba(255,255,255,.08);color:rgba(242,232,213,.7);}
.btn-danger-sm{background:var(--danger);color:#fff;}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-moss{background:var(--moss);color:#fff;}

/* ── BODY ── */
.admin-body{max-width:1100px;margin:0 auto;padding:2.5rem 1.5rem;}
.tabs{display:flex;gap:0;border-bottom:2px solid rgba(139,107,69,.15);margin-bottom:2.5rem;}
.tab-btn{padding:.65rem 1.6rem;font-size:.82rem;letter-spacing:.12em;background:none;border:none;cursor:pointer;color:var(--wood-lt);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;}
.tab-btn.active{color:var(--indigo);border-bottom-color:var(--indigo);font-weight:500;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* ── FORM CARD ── */
.form-card{background:var(--parchment);padding:2rem;border:1px solid rgba(139,107,69,.15);margin-bottom:1.5rem;}
.form-card h2{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:700;color:var(--wood-dk);letter-spacing:.1em;margin-bottom:1.5rem;padding-bottom:.7rem;border-bottom:1px solid rgba(139,107,69,.15);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:.35rem;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:.7rem;letter-spacing:.25em;color:var(--wood-lt);}
.form-group input,.form-group select,.form-group textarea{padding:.6rem .85rem;border:1px solid rgba(139,107,69,.25);background:#fff;font-size:.88rem;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--indigo);}
.form-group textarea{resize:vertical;min-height:100px;}
.form-hint{font-size:.7rem;color:var(--stone);margin-top:.25rem;}
.form-actions{margin-top:1.5rem;display:flex;gap:.8rem;align-items:center;flex-wrap:wrap;}
.btn-add{padding:.65rem 2.4rem;background:var(--indigo);border:none;color:#fff;font-family:'Noto Serif TC',serif;font-size:.85rem;letter-spacing:.2em;cursor:pointer;transition:background .2s;}
.btn-add:hover{background:var(--indigo-dk);}
.btn-add:disabled{background:var(--stone);cursor:default;}
.form-msg{font-size:.8rem;letter-spacing:.1em;}
.form-msg.ok{color:var(--moss);}
.form-msg.err{color:var(--danger);}

/* ── PHOTO UPLOAD ── */
.photo-upload-area{position:relative;}
.photo-preview-thumb{width:100%;max-height:200px;object-fit:cover;display:none;border:1px solid rgba(139,107,69,.2);margin-top:.5rem;}
.btn-crop-trigger{margin-top:.5rem;padding:.4rem 1.1rem;background:var(--indigo);border:none;color:#fff;font-size:.72rem;letter-spacing:.15em;cursor:pointer;display:none;}

/* ── CAT LIST ── */
.cat-list{display:flex;flex-direction:column;gap:1rem;}
.cat-list-item{background:var(--parchment);border:1px solid rgba(139,107,69,.15);overflow:hidden;}
/* View mode */
.cat-view{display:flex;gap:1.2rem;align-items:flex-start;padding:1.2rem;transition:box-shadow .2s;}
.cat-view:hover{box-shadow:0 4px 16px rgba(30,19,10,.08);}
.cat-list-thumb{width:80px;height:80px;flex-shrink:0;object-fit:cover;object-position:center top;cursor:pointer;}
.cat-list-thumb:hover{opacity:.85;}
.cat-list-thumb-placeholder{width:80px;height:80px;flex-shrink:0;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-size:1.8rem;cursor:pointer;}
.cat-list-info{flex:1;min-width:0;}
.cat-list-name{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;color:var(--wood-dk);letter-spacing:.1em;}
.cat-list-meta{font-size:.78rem;color:var(--wood-lt);margin:.2rem 0 .4rem;}
.cat-list-story{font-size:.82rem;color:var(--wood-md);line-height:1.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px;}
.cat-list-actions{display:flex;gap:.5rem;flex-shrink:0;flex-direction:column;}
.btn-edit{padding:.4rem .9rem;background:transparent;border:1px solid var(--indigo);color:var(--indigo);font-size:.72rem;letter-spacing:.12em;cursor:pointer;transition:background .2s,color .2s;}
.btn-edit:hover{background:var(--indigo);color:#fff;}
.btn-del{padding:.4rem .9rem;background:transparent;border:1px solid var(--danger);color:var(--danger);font-size:.72rem;letter-spacing:.12em;cursor:pointer;transition:background .2s,color .2s;}
.btn-del:hover{background:var(--danger);color:#fff;}
/* Edit mode */
.cat-edit-form{display:none;padding:1.5rem;border-top:1px solid rgba(139,107,69,.15);background:var(--cream);}
.cat-edit-form.show{display:block;}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:.8rem;}
.edit-field{display:flex;flex-direction:column;gap:.3rem;}
.edit-field.full{grid-column:1/-1;}
.edit-field label{font-size:.68rem;letter-spacing:.22em;color:var(--wood-lt);}
.edit-field input,.edit-field select,.edit-field textarea{padding:.5rem .75rem;border:1px solid rgba(139,107,69,.25);font-size:.85rem;font-family:'Noto Sans TC',sans-serif;outline:none;background:#fff;}
.edit-field textarea{min-height:80px;resize:vertical;}
.edit-photo-current{width:80px;height:80px;object-fit:cover;border:1px solid rgba(139,107,69,.2);display:block;margin-bottom:.5rem;}
.edit-photo-placeholder{width:80px;height:80px;background:var(--indigo);display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:.5rem;}
.edit-actions{display:flex;gap:.7rem;margin-top:1rem;flex-wrap:wrap;}
.btn-save{padding:.5rem 1.6rem;background:var(--moss);border:none;color:#fff;font-size:.78rem;letter-spacing:.15em;cursor:pointer;}
.btn-cancel{padding:.5rem 1.2rem;background:transparent;border:1px solid var(--stone);color:var(--wood-lt);font-size:.78rem;letter-spacing:.15em;cursor:pointer;}

.empty-list{text-align:center;padding:3rem;color:var(--stone);font-size:.88rem;letter-spacing:.1em;}

/* ── SETTINGS ── */
.settings-card{background:var(--parchment);padding:2rem;border:1px solid rgba(139,107,69,.15);margin-bottom:1.2rem;}
.settings-card h3{font-family:'Noto Serif TC',serif;font-size:.95rem;font-weight:700;color:var(--wood-dk);margin-bottom:1rem;letter-spacing:.1em;}
.settings-card p{font-size:.82rem;color:var(--wood-md);line-height:1.9;margin-bottom:.8rem;}
.settings-row{display:flex;gap:.6rem;align-items:center;margin-bottom:.7rem;flex-wrap:wrap;}
.settings-input{flex:1;min-width:180px;padding:.6rem .85rem;border:1px solid rgba(139,107,69,.25);font-size:.85rem;font-family:'Noto Sans TC',sans-serif;outline:none;background:#fff;}
.tag-ok{display:inline-block;font-size:.72rem;letter-spacing:.1em;padding:.25rem .7rem;background:rgba(90,110,74,.12);color:var(--moss);}
.tag-missing{display:inline-block;font-size:.72rem;letter-spacing:.1em;padding:.25rem .7rem;background:rgba(176,64,64,.1);color:var(--danger);}

/* ── CROPPER MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.show{display:flex;}
.modal-box{background:#fff;max-width:600px;width:100%;max-height:90vh;display:flex;flex-direction:column;}
.modal-head{padding:1rem 1.5rem;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:700;color:var(--wood-dk);letter-spacing:.1em;}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--stone);line-height:1;}
.modal-body{flex:1;overflow:auto;padding:1rem;display:flex;align-items:center;justify-content:center;min-height:300px;background:#f5f5f5;}
.modal-body img{max-width:100%;display:block;}
.modal-foot{padding:1rem 1.5rem;border-top:1px solid #eee;display:flex;gap:.7rem;justify-content:flex-end;}
.btn-crop-confirm{padding:.55rem 1.8rem;background:var(--indigo);border:none;color:#fff;font-size:.82rem;letter-spacing:.18em;cursor:pointer;}
.btn-crop-cancel{padding:.55rem 1.2rem;background:transparent;border:1px solid var(--stone);color:var(--wood-lt);font-size:.82rem;letter-spacing:.12em;cursor:pointer;}
.crop-ratio-btns{display:flex;gap:.4rem;margin-right:auto;}
.crop-ratio-btn{padding:.3rem .7rem;font-size:.7rem;border:1px solid var(--stone);background:transparent;color:var(--wood-lt);cursor:pointer;}
.crop-ratio-btn.active{background:var(--indigo);color:#fff;border-color:var(--indigo);}

/* ── LOADING ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(30,19,10,.45);z-index:500;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:600px){
  .form-grid,.edit-grid{grid-template-columns:1fr;}
  .admin-body{padding:1.5rem 1rem;}
  header{padding:0 1rem;}
  .cat-list-actions{flex-direction:row;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">貓嶼微光</div>
    <div class="login-sub">後台管理系統</div>
    <label>管理員密碼</label>
    <input id="pw-input" type="password" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div id="login-error" class="login-error">密碼錯誤，請再試一次</div>
    <button class="btn-primary" onclick="doLogin()">登入</button>
  </div>
</div>

<!-- LOADING -->
<div class="overlay" id="overlay"><div class="spinner"></div></div>

<!-- CROPPER MODAL -->
<div class="modal-bg" id="cropper-modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3>裁切照片</h3>
      <button class="modal-close" onclick="closeCropper()">✕</button>
    </div>
    <div class="modal-body">
      <img id="cropper-img" src="" alt="crop"/>
    </div>
    <div class="modal-foot">
      <div class="crop-ratio-btns">
        <button class="crop-ratio-btn active" onclick="setRatio(1,1,this)">1:1</button>
        <button class="crop-ratio-btn" onclick="setRatio(4,3,this)">4:3</button>
        <button class="crop-ratio-btn" onclick="setRatio(3,4,this)">3:4</button>
        <button class="crop-ratio-btn" onclick="setRatio(NaN,NaN,this)">自由</button>
      </div>
      <button class="btn-crop-cancel" onclick="closeCropper()">取消</button>
      <button class="btn-crop-confirm" onclick="confirmCrop()">確認裁切</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div class="header-logo">貓嶼微光 · 後台</div>
    <div class="header-actions">
      <a href="./cats.html" target="_blank" class="btn-sm btn-secondary">查看前台 ↗</a>
      <button class="btn-sm btn-secondary" onclick="doLogout()">登出</button>
    </div>
  </header>

  <div class="admin-body">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('add',this)">新增貓咪</button>
      <button class="tab-btn" onclick="switchTab('list',this)">管理貓咪列表</button>
      <button class="tab-btn" onclick="switchTab('settings',this)">設定</button>
    </div>

    <!-- TAB: ADD -->
    <div id="tab-add" class="tab-panel active">
      <div class="form-card">
        <h2>新增待認養貓咪</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>貓咪名字 *</label>
            <input id="f-name" type="text" placeholder="例：橘子"/>
          </div>
          <div class="form-group">
            <label>性別 *</label>
            <select id="f-gender">
              <option value="">請選擇</option>
              <option value="男生">男生 ♂</option>
              <option value="女生">女生 ♀</option>
              <option value="未知">未知</option>
            </select>
          </div>
          <div class="form-group full">
            <label>個性特質</label>
            <input id="f-personality" type="text" placeholder="例：溫柔愛撒嬌、喜歡與人互動"/>
          </div>
          <div class="form-group full">
            <label>故事介紹</label>
            <textarea id="f-story" placeholder="牠的背景故事、健康狀況、特殊需求等…"></textarea>
          </div>
          <div class="form-group full">
            <label>上傳照片</label>
            <div class="photo-upload-area">
              <input id="f-photo-file" type="file" accept="image/*" onchange="onPhotoSelected(this,'add')"/>
              <div class="form-hint">選擇後可裁切照片大小</div>
              <img id="f-photo-preview" class="photo-preview-thumb" alt="預覽"/>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-add" id="btn-add" onclick="addCat()">新增貓咪</button>
          <span id="form-msg" class="form-msg"></span>
        </div>
      </div>
    </div>

    <!-- TAB: LIST -->
    <div id="tab-list" class="tab-panel">
      <div id="cat-list-container"><div class="empty-list">載入中…</div></div>
    </div>

    <!-- TAB: SETTINGS -->
    <div id="tab-settings" class="tab-panel">

      <!-- GitHub Token -->
      <div class="settings-card">
        <h3>GitHub Access Token</h3>
        <p>後台透過 GitHub API 儲存貓咪資料。請在 GitHub → Settings → Developer Settings → Personal Access Tokens → Tokens (classic) 產生一組 Token，勾選 <code>repo</code> 權限。Token 僅存於瀏覽器本地。</p>
        <div class="settings-row">
          <input id="token-input" class="settings-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"/>
          <button class="btn-sm btn-gold" onclick="saveToken()">儲存</button>
          <button class="btn-sm btn-secondary" onclick="clearToken()">清除</button>
        </div>
        <span id="token-status"></span>
      </div>

      <!-- Change Password -->
      <div class="settings-card">
        <h3>修改管理員密碼</h3>
        <div class="settings-row">
          <input id="pw-current" class="settings-input" type="password" placeholder="目前密碼"/>
        </div>
        <div class="settings-row">
          <input id="pw-new" class="settings-input" type="password" placeholder="新密碼（至少6碼）"/>
        </div>
        <div class="settings-row">
          <input id="pw-confirm" class="settings-input" type="password" placeholder="再次輸入新密碼"/>
          <button class="btn-sm btn-gold" onclick="changePassword()">更新密碼</button>
        </div>
        <span id="pw-msg" class="form-msg"></span>
      </div>

    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
<script>
// ─── CONFIG ──────────────────────────────────────
const GITHUB_OWNER = 'terrgff8';
const GITHUB_REPO  = 'meow-island';
const CATS_FILE    = 'cats.json';
const PHOTOS_DIR   = 'cat-photos';
const DEFAULT_PW   = 'meow2025';
// ─────────────────────────────────────────────────

// ── HELPERS ──
function getToken(){ return localStorage.getItem('mi_gh_token') || ''; }
function getPassword(){ return localStorage.getItem('mi_pw') || DEFAULT_PW; }
function overlay(show){ document.getElementById('overlay').classList.toggle('show', show); }

// UTF-8 safe base64
function toB64(str){
  const bytes = new TextEncoder().encode(str);
  return btoa(String.fromCharCode(...bytes));
}
function fromB64(b64){
  const bin = atob(b64.replace(/\n/g,''));
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}

// ── AUTH ──
function doLogin(){
  const pw = document.getElementById('pw-input').value;
  if(pw === getPassword()){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    checkToken();
    loadCatList();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}
function doLogout(){
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

// ── TABS ──
function switchTab(id, btn){
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='list') loadCatList();
  if(id==='settings') checkToken();
}

// ── TOKEN ──
function checkToken(){
  const t = getToken();
  const el = document.getElementById('token-status');
  el.textContent = t ? '✓ Token 已設定' : '尚未設定 Token';
  el.className = t ? 'tag-ok' : 'tag-missing';
}
function saveToken(){
  const val = document.getElementById('token-input').value.trim();
  if(val && !val.startsWith('•')){ localStorage.setItem('mi_gh_token', val); }
  checkToken();
  alert('Token 已儲存！');
}
function clearToken(){
  localStorage.removeItem('mi_gh_token');
  document.getElementById('token-input').value = '';
  checkToken();
}

// ── PASSWORD CHANGE ──
function changePassword(){
  const cur     = document.getElementById('pw-current').value;
  const next    = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  const msgEl   = document.getElementById('pw-msg');
  if(cur !== getPassword()){ msgEl.textContent='目前密碼不正確'; msgEl.className='form-msg err'; return; }
  if(next.length < 6){ msgEl.textContent='新密碼至少需要6碼'; msgEl.className='form-msg err'; return; }
  if(next !== confirm){ msgEl.textContent='兩次輸入的新密碼不相符'; msgEl.className='form-msg err'; return; }
  localStorage.setItem('mi_pw', next);
  ['pw-current','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value='');
  msgEl.textContent='✓ 密碼已更新！'; msgEl.className='form-msg ok';
}

// ── GITHUB API ──
async function ghGet(path){
  const r = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`,{
    headers:{ Authorization:`token ${getToken()}`, Accept:'application/vnd.github.v3+json' }
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function ghPut(path, content64, sha, message){
  const body = { message, content: content64 };
  if(sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`,{
    method:'PUT',
    headers:{ Authorization:`token ${getToken()}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' },
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function getCatsData(){
  try{
    const file = await ghGet(CATS_FILE);
    const json = JSON.parse(fromB64(file.content));
    return { cats: json.cats || [], sha: file.sha };
  } catch(e){ return { cats:[], sha:null }; }
}
async function saveCatsData(cats, sha, message){
  const content = toB64(JSON.stringify({ cats }, null, 2));
  return ghPut(CATS_FILE, content, sha, message);
}
async function uploadPhoto(dataUrl, filename){
  const base64 = dataUrl.split(',')[1];
  const ext = dataUrl.includes('image/png') ? 'png' : 'jpg';
  const path = `${PHOTOS_DIR}/${filename||Date.now()}.${ext}`;
  await ghPut(path, base64, null, `upload: 貓咪照片`);
  return `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/${path}`;
}

// ── CROPPER ──
let cropperInstance = null;
let cropCallback    = null;

function onPhotoSelected(input, context){
  if(!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => openCropper(e.target.result, context);
  reader.readAsDataURL(input.files[0]);
}

function openCropper(dataUrl, context){
  const modal = document.getElementById('cropper-modal');
  const img   = document.getElementById('cropper-img');
  img.src = dataUrl;
  modal.classList.add('show');
  // destroy previous instance
  if(cropperInstance){ cropperInstance.destroy(); cropperInstance = null; }
  setTimeout(() => {
    cropperInstance = new Cropper(img, { aspectRatio:1, viewMode:1, autoCropArea:.9, background:false });
  }, 100);
  // set callback
  cropCallback = (croppedUrl) => {
    if(context === 'add'){
      const preview = document.getElementById('f-photo-preview');
      preview.src = croppedUrl;
      preview.style.display = 'block';
      addCropData = croppedUrl;
    } else if(context && context.startsWith('edit:')){
      const id = context.split(':')[1];
      const editPreview = document.getElementById('edit-photo-preview-'+id);
      if(editPreview){ editPreview.src = croppedUrl; editPreview.style.display='block'; }
      editCropData[id] = croppedUrl;
    }
  };
}

function closeCropper(){
  document.getElementById('cropper-modal').classList.remove('show');
  if(cropperInstance){ cropperInstance.destroy(); cropperInstance = null; }
}

function confirmCrop(){
  if(!cropperInstance) return;
  const canvas = cropperInstance.getCroppedCanvas({ width:900, height:900, imageSmoothingQuality:'high' });
  const url = canvas.toDataURL('image/jpeg', 0.88);
  if(cropCallback) cropCallback(url);
  closeCropper();
}

function setRatio(w, h, btn){
  document.querySelectorAll('.crop-ratio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(cropperInstance) cropperInstance.setAspectRatio(isNaN(w) ? NaN : w/h);
}

let addCropData  = null;   // cropped dataUrl for add form
let editCropData = {};     // { catId: croppedDataUrl }

// ── ADD CAT ──
function setMsg(msg, type){ const el=document.getElementById('form-msg'); el.textContent=msg; el.className='form-msg '+(type||''); }

async function addCat(){
  if(!getToken()){ alert('請先在「設定」頁面設定 GitHub Token！'); return; }
  const name   = document.getElementById('f-name').value.trim();
  const gender = document.getElementById('f-gender').value;
  if(!name){  setMsg('請輸入貓咪名字','err'); return; }
  if(!gender){ setMsg('請選擇性別','err'); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true; overlay(true); setMsg('儲存中…','');
  try {
    let photoUrl = '';
    if(addCropData){
      setMsg('上傳照片中…','');
      photoUrl = await uploadPhoto(addCropData);
    }
    const { cats, sha } = await getCatsData();
    cats.unshift({ id: Date.now().toString(), name, gender,
      personality: document.getElementById('f-personality').value.trim(),
      story: document.getElementById('f-story').value.trim(),
      photo: photoUrl,
      date: new Date().toISOString().split('T')[0]
    });
    await saveCatsData(cats, sha, `add: 新增貓咪「${name}」`);
    ['f-name','f-personality','f-story'].forEach(id => document.getElementById(id).value='');
    document.getElementById('f-gender').value='';
    document.getElementById('f-photo-file').value='';
    document.getElementById('f-photo-preview').style.display='none';
    addCropData = null;
    setMsg(`✓ 「${name}」已成功新增！`, 'ok');
  } catch(e){
    setMsg('錯誤：'+(e.message||'請確認 Token'),'err');
    console.error(e);
  } finally { btn.disabled=false; overlay(false); }
}

// ── CAT LIST ──
async function loadCatList(){
  const container = document.getElementById('cat-list-container');
  if(!getToken()){ container.innerHTML='<div class="empty-list">請先在「設定」設定 GitHub Token</div>'; return; }
  container.innerHTML='<div class="empty-list">載入中…</div>';
  try {
    const { cats } = await getCatsData();
    if(cats.length === 0){ container.innerHTML='<div class="empty-list">目前沒有貓咪資料</div>'; return; }
    const list = document.createElement('div');
    list.className = 'cat-list';
    cats.forEach(cat => list.appendChild(buildCatItem(cat)));
    container.innerHTML='';
    container.appendChild(list);
  } catch(e){ container.innerHTML='<div class="empty-list">載入失敗，請確認 Token</div>'; }
}

function buildCatItem(cat){
  const item = document.createElement('div');
  item.className = 'cat-list-item';
  item.id = 'cat-item-' + cat.id;

  const thumbHtml = cat.photo
    ? `<img class="cat-list-thumb" src="${cat.photo}" alt="${cat.name}"
         onclick="openCropper(this.src,'edit:${cat.id}')"
         title="點擊更換照片"
         onerror="this.outerHTML='<div class=cat-list-thumb-placeholder onclick=triggerEditPhoto(\\'${cat.id}\\')>🐱</div>'">`
    : `<div class="cat-list-thumb-placeholder" onclick="triggerEditPhoto('${cat.id}')" title="點擊新增照片">🐱</div>`;

  item.innerHTML = `
    <div class="cat-view">
      ${thumbHtml}
      <div class="cat-list-info">
        <div class="cat-list-name">${cat.name} <span style="font-size:.7rem;color:var(--stone)">${cat.gender||''}</span></div>
        <div class="cat-list-meta">${cat.personality||'個性未填'} · ${cat.date||'—'}</div>
        <div class="cat-list-story">${cat.story||'（無故事介紹）'}</div>
      </div>
      <div class="cat-list-actions">
        <button class="btn-edit" onclick="toggleEdit('${cat.id}')">編輯</button>
        <button class="btn-del"  onclick="deleteCat('${cat.id}','${cat.name}')">刪除</button>
      </div>
    </div>
    <div class="cat-edit-form" id="edit-form-${cat.id}">
      <div class="edit-grid">
        <div class="edit-field"><label>名字</label><input id="e-name-${cat.id}" value="${cat.name}"/></div>
        <div class="edit-field">
          <label>性別</label>
          <select id="e-gender-${cat.id}">
            <option value="男生" ${cat.gender==='男生'?'selected':''}>男生 ♂</option>
            <option value="女生" ${cat.gender==='女生'?'selected':''}>女生 ♀</option>
            <option value="未知" ${cat.gender==='未知'?'selected':''}>未知</option>
          </select>
        </div>
        <div class="edit-field full"><label>個性特質</label><input id="e-personality-${cat.id}" value="${cat.personality||''}"/></div>
        <div class="edit-field full"><label>故事介紹</label><textarea id="e-story-${cat.id}">${cat.story||''}</textarea></div>
        <div class="edit-field full">
          <label>更換照片（點擊縮圖也可更換）</label>
          <input type="file" accept="image/*" onchange="onPhotoSelected(this,'edit:${cat.id}')"/>
          <img id="edit-photo-preview-${cat.id}" src="${cat.photo||''}" style="width:100px;height:100px;object-fit:cover;margin-top:.5rem;display:${cat.photo?'block':'none'};"/>
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn-save" onclick="saveEdit('${cat.id}','${cat.name}')">儲存修改</button>
        <button class="btn-cancel" onclick="toggleEdit('${cat.id}')">取消</button>
        <span id="edit-msg-${cat.id}" class="form-msg"></span>
      </div>
    </div>`;
  return item;
}

function toggleEdit(id){
  const form = document.getElementById('edit-form-'+id);
  form.classList.toggle('show');
}
function triggerEditPhoto(id){
  const form = document.getElementById('edit-form-'+id);
  if(!form.classList.contains('show')) form.classList.add('show');
  const fileInput = form.querySelector('input[type=file]');
  if(fileInput) fileInput.click();
}

async function saveEdit(id, oldName){
  if(!getToken()){ alert('請先設定 GitHub Token'); return; }
  const msgEl = document.getElementById('edit-msg-'+id);
  msgEl.textContent='儲存中…'; msgEl.className='form-msg';
  overlay(true);
  try {
    const { cats, sha } = await getCatsData();
    const idx = cats.findIndex(c => c.id === id);
    if(idx === -1) throw new Error('找不到此貓咪資料');
    const cat = cats[idx];

    // Upload new photo if cropped
    if(editCropData[id]){
      cat.photo = await uploadPhoto(editCropData[id]);
      delete editCropData[id];
    }
    cat.name        = document.getElementById('e-name-'+id).value.trim() || cat.name;
    cat.gender      = document.getElementById('e-gender-'+id).value;
    cat.personality = document.getElementById('e-personality-'+id).value.trim();
    cat.story       = document.getElementById('e-story-'+id).value.trim();

    cats[idx] = cat;
    await saveCatsData(cats, sha, `edit: 修改貓咪「${cat.name}」`);
    msgEl.textContent='✓ 儲存成功！'; msgEl.className='form-msg ok';
    // Rebuild item
    const newItem = buildCatItem(cat);
    const old = document.getElementById('cat-item-'+id);
    old.replaceWith(newItem);
  } catch(e){
    msgEl.textContent='錯誤：'+e.message; msgEl.className='form-msg err';
    console.error(e);
  } finally { overlay(false); }
}

async function deleteCat(id, name){
  if(!confirm(`確定要刪除「${name}」嗎？此動作無法復原。`)) return;
  if(!getToken()){ alert('請先設定 GitHub Token'); return; }
  overlay(true);
  try {
    const { cats, sha } = await getCatsData();
    const updated = cats.filter(c => c.id !== id);
    await saveCatsData(updated, sha, `delete: 移除貓咪「${name}」`);
    const item = document.getElementById('cat-item-'+id);
    if(item) item.remove();
    if(!document.querySelector('.cat-list-item')){
      document.getElementById('cat-list-container').innerHTML='<div class="empty-list">目前沒有貓咪資料</div>';
    }
  } catch(e){ alert('刪除失敗：'+e.message); }
  finally { overlay(false); }
}

document.getElementById('pw-input').focus();
</script>
