<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>貓驛中途 — 貓嶼微光</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --parchment:#f2e8d5;
  --cream:    #faf4ea;
  --wood-dk:  #3d2b1a;
  --wood-md:  #6b4a30;
  --wood-lt:  #a07850;
  --stone:    #c8a87a;
  --indigo-dk:#253d5e;
  --indigo:   #2e4a6b;
  --indigo-lt:#4a6e96;
  --sakura:   #e8b4b8;
  --gold:     #c8a030;
  --ink:      #1e130a;
  --moss:     #5a6e4a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--wood-dk);line-height:1.8;overflow-x:hidden;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(30,19,10,.9);backdrop-filter:blur(10px);
  height:58px;display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;border-bottom:1px solid rgba(200,160,48,.2);
}
.nav-logo{font-family:'Noto Serif TC',serif;font-size:1.1rem;font-weight:900;color:var(--gold);letter-spacing:.2em;text-decoration:none;}
.nav-logo em{font-style:normal;font-size:.75rem;color:var(--stone);letter-spacing:.18em;display:block;margin-top:-2px;}
.nav-back{font-size:.78rem;color:rgba(242,232,213,.65);text-decoration:none;letter-spacing:.12em;border-bottom:1px solid transparent;transition:color .2s,border-color .2s;}
.nav-back:hover{color:var(--gold);border-bottom-color:var(--gold);}

/* HERO */
.hero{
  padding-top:58px;
  background:var(--indigo-dk);
  text-align:center;
  padding-bottom:3.5rem;
}
.hero-inner{padding:3.5rem 1.5rem 0;}
.hero-label{font-size:.7rem;letter-spacing:.5em;color:var(--indigo-lt);margin-bottom:.6rem;}
.hero-title{
  font-family:'Noto Serif TC',serif;font-size:clamp(1.8rem,5vw,3rem);
  font-weight:900;color:#fff;letter-spacing:.15em;margin-bottom:1rem;
}
.hero-desc{font-size:.9rem;color:rgba(242,232,213,.65);max-width:560px;margin:0 auto;line-height:2;}

/* NOREN */
.noren{display:flex;justify-content:center;gap:3px;height:36px;overflow:hidden;background:var(--indigo-dk);}
.noren span{display:block;width:36px;height:36px;background:var(--gold);border-radius:0 0 50% 50%;}

/* CAT GRID */
.cats-section{padding:4rem 1.5rem 5rem;}
.cats-inner{max-width:1060px;margin:0 auto;}
.cats-status{text-align:center;font-size:.9rem;color:var(--wood-lt);padding:3rem 0;}

.cat-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:2rem;
}
.cat-card{
  background:var(--parchment);
  border:1px solid rgba(139,107,69,.15);
  overflow:hidden;
  transition:transform .25s,box-shadow .25s;
}
.cat-card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(30,19,10,.1);}
.cat-photo{
  width:100%;height:240px;
  object-fit:cover;object-position:center top;
  display:block;
}
.cat-photo-placeholder{
  width:100%;height:240px;
  background:linear-gradient(135deg,var(--indigo) 0%,var(--indigo-dk) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;
}
.cat-body{padding:1.4rem 1.6rem 1.6rem;}
.cat-header{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.5rem;}
.cat-name{font-family:'Noto Serif TC',serif;font-size:1.2rem;font-weight:900;color:var(--wood-dk);letter-spacing:.1em;}
.cat-gender{
  font-size:.68rem;letter-spacing:.18em;padding:.15rem .5rem;
  border-radius:0;
}
.cat-gender.male{background:rgba(46,74,107,.12);color:var(--indigo);}
.cat-gender.female{background:rgba(232,180,184,.3);color:#8b4a50;}
.cat-personality{
  font-size:.8rem;color:var(--wood-lt);letter-spacing:.1em;
  margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem;
}
.cat-personality::before{content:'♡';color:var(--sakura);}
.cat-story{font-size:.86rem;color:var(--wood-md);line-height:1.9;}
.cat-cta{
  display:inline-block;margin-top:1.2rem;
  padding:.5rem 1.6rem;
  background:transparent;border:1.5px solid var(--indigo);
  color:var(--indigo);font-family:'Noto Serif TC',serif;
  font-size:.78rem;letter-spacing:.2em;text-decoration:none;
  transition:background .2s,color .2s;
}
.cat-cta:hover{background:var(--indigo);color:#fff;}
.cat-date{
  display:block;margin-top:.8rem;
  font-size:.68rem;letter-spacing:.12em;color:rgba(139,107,69,.5);
}

/* EMPTY STATE */
.empty{
  text-align:center;padding:5rem 1.5rem;
}
.empty-icon{font-size:4rem;margin-bottom:1rem;}
.empty-text{font-family:'Noto Serif TC',serif;font-size:1.1rem;color:var(--wood-lt);letter-spacing:.1em;}
.empty-sub{font-size:.82rem;color:var(--stone);margin-top:.5rem;}

/* FOOTER */
footer{background:var(--ink);padding:2.5rem 1.5rem;text-align:center;}
.footer-logo{font-family:'Noto Serif TC',serif;font-size:1.2rem;color:var(--gold);letter-spacing:.25em;}
.footer-sub{font-size:.68rem;letter-spacing:.4em;color:rgba(242,232,213,.25);margin:.3rem 0 1rem;}
.footer-copy{font-size:.65rem;color:rgba(242,232,213,.15);letter-spacing:.1em;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease;}
.reveal.visible{opacity:1;transform:none;}

@media(max-width:900px){.cat-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.cat-grid{grid-template-columns:1fr;}nav{padding:0 1.2rem;}}
</style>
</head>
<body>

<nav>
  <a href="./index.html" class="nav-logo">
    貓嶼微光
    <em>MEOW ISLAND PET HOTEL</em>
  </a>
  <a href="./index.html" class="nav-back">← 回到首頁</a>
</nav>

<div class="hero">
  <div class="hero-inner">
    <p class="hero-label">CAT ADOPTION</p>
    <h1 class="hero-title">貓驛中途</h1>
    <p class="hero-desc">這些貓咪正在等待一個屬於自己的家。<br/>牠們在貓嶼微光被好好照顧著，期待有一天能遇見帶牠回家的那個人。</p>
  </div>
</div>
<div class="noren"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>

<section class="cats-section">
  <div class="cats-inner">
    <div id="cat-grid-container">
      <div class="cats-status">載入中…</div>
    </div>
  </div>
</section>

<footer>
  <div class="footer-logo">貓嶼微光</div>
  <div class="footer-sub">MEOW ISLAND PET HOTEL</div>
  <div class="footer-copy">© 2025 貓嶼微光 Meow Island Pet Hotel. All rights reserved.</div>
</footer>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/terrgff8/meow-island/main/cats.json';
const LINE_URL = 'https://lin.ee/vVLrPIY';

async function loadCats() {
  const container = document.getElementById('cat-grid-container');
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await res.json();
    const cats = data.cats || [];

    if (cats.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🐾</div>
          <div class="empty-text">目前沒有待認養的貓咪</div>
          <div class="empty-sub">請稍後再來，或透過 LINE 詢問最新消息</div>
        </div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'cat-grid';

    cats.forEach(cat => {
      const genderClass = cat.gender === '男生' || cat.gender === '男' ? 'male' : 'female';
      const genderLabel = cat.gender || '未知';

      const card = document.createElement('div');
      card.className = 'cat-card reveal';
      card.innerHTML = `
        ${cat.photo
          ? `<img class="cat-photo" src="${cat.photo}" alt="${cat.name}" loading="lazy" onerror="this.outerHTML='<div class=cat-photo-placeholder>🐱</div>'">`
          : `<div class="cat-photo-placeholder">🐱</div>`}
        <div class="cat-body">
          <div class="cat-header">
            <span class="cat-name">${cat.name}</span>
            <span class="cat-gender ${genderClass}">${genderLabel}</span>
          </div>
          <div class="cat-personality">${cat.personality || '個性待補充'}</div>
          <div class="cat-story">${cat.story || ''}</div>
          <a href="${LINE_URL}" target="_blank" rel="noopener" class="cat-cta">我想認養牠</a>
          ${cat.date ? `<span class="cat-date">收容日期：${cat.date}</span>` : ''}
        </div>`;
      grid.appendChild(card);
    });

    container.innerHTML = '';
    container.appendChild(grid);

    // Scroll reveal
    const obs = new IntersectionObserver(
      e => e.forEach(x => x.isIntersecting && x.target.classList.add('visible')),
      {threshold: 0.08}
    );
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  } catch(err) {
    container.innerHTML = `<div class="cats-status">資料載入失敗，請稍後再試。</div>`;
    console.error(err);
  }
}

loadCats();
</script>
</body>
</html>
